<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Balans to'ldirishlarni tasdiqlash</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .admin-wrap{ max-width: 760px; margin: 0 auto; padding: 40px 24px; }
  .admin-wrap h1{ font-family: var(--display); font-size: 26px; margin-bottom: 24px; }
  .login-box{ max-width: 320px; margin: 80px auto; text-align:center; }
  .login-box input{ width:100%; padding: 12px; border:1px solid var(--line); border-radius: var(--radius); margin: 12px 0; }
  .pending-item{
    border: 1px solid var(--line); border-radius: var(--radius); padding: 16px;
    margin-bottom: 14px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px;
  }
  .pending-item h3{ font-size: 16px; margin-bottom: 4px; }
  .pending-item p{ font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; }
  .pending-left{ display:flex; gap:14px; align-items:flex-start; }
  .receipt-thumb{
    width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius);
    border: 1px solid var(--line); cursor: pointer; flex-shrink: 0;
  }
  .receipt-thumb-pdf{
    display:flex; align-items:center; justify-content:center;
    background:#F4FAF8; color: var(--primary); font-weight:700; font-size:13px;
    text-decoration:none;
  }
  .pending-actions{ display:flex; gap:8px; flex-shrink:0; flex-direction:column; }
  .btn-approve{ background: var(--primary); color:#fff; border:none; padding:8px 14px; border-radius: var(--radius); cursor:pointer; font-weight:600; font-size:13px; }
  .btn-reject{ background:#fff; color:#C0392B; border:1px solid #C0392B; padding:8px 14px; border-radius: var(--radius); cursor:pointer; font-weight:600; font-size:13px; }
  .no-pending{ text-align:center; color: var(--ink-soft); padding: 40px 0; }
  .amount-tag{ font-family: var(--mono); font-weight:700; color: var(--primary); font-size: 15px; }
  .method-tag{
    display:inline-block; font-size: 11px; text-transform: uppercase; letter-spacing:.04em;
    background:#F4FAF8; color: var(--primary); padding: 2px 8px; border-radius: 999px; margin-left: 8px;
  }
  .lightbox{
    position:fixed; inset:0; background: rgba(0,0,0,.8); display:none;
    align-items:center; justify-content:center; z-index: 200; padding: 24px;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{ max-width: 90vw; max-height: 90vh; border-radius: 6px; }
</style>
</head>
<body>

<div id="loginBox" class="login-box">
  <h2 style="font-family:var(--display); font-size:22px; margin-bottom:8px;">Admin kirish</h2>
  <p style="color:var(--ink-soft); font-size:13px; margin-bottom:16px;">Karta/kripto to'ldirishlarni tasdiqlash uchun</p>
  <input type="password" id="passwordInput" placeholder="Admin parol" />
  <button class="btn-primary btn-block" id="loginBtn">Kirish</button>
</div>

<div id="adminWrap" class="admin-wrap" hidden>
  <h1>Balans to'ldirish so'rovlari</h1>
  <div id="pendingList"></div>
  <p id="noPending" class="no-pending" hidden>Hozircha tasdiq kutayotgan so'rov yo'q ✅</p>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="chek" />
</div>

<script>
let password = '';

document.getElementById('loginBtn').addEventListener('click', async () => {
  password = document.getElementById('passwordInput').value;
  const ok = await loadPending();
  if (ok) {
    document.getElementById('loginBox').hidden = true;
    document.getElementById('adminWrap').hidden = false;
  } else {
    alert('Parol noto‘g‘ri');
  }
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

async function loadPending() {
  const res = await fetch('/api/admin/deposits/pending', { headers: { 'x-admin-password': password } });
  if (!res.ok) return false;
  const deposits = await res.json();
  renderPending(deposits);
  return true;
}

function renderPending(deposits) {
  const list = document.getElementById('pendingList');
  const empty = document.getElementById('noPending');
  list.innerHTML = '';
  empty.hidden = deposits.length > 0;

  deposits.forEach((d) => {
    const div = document.createElement('div');
    div.className = 'pending-item';
    const isPdf = /\.pdf$/i.test(d.receipt_url);
    const thumbHtml = isPdf
      ? `<a class="receipt-thumb receipt-thumb-pdf" href="${d.receipt_url}" target="_blank" rel="noopener">📄 PDF</a>`
      : `<img class="receipt-thumb" src="${d.receipt_url}" data-full="${d.receipt_url}" alt="chek" />`;
    div.innerHTML = `
      <div class="pending-left">
        ${thumbHtml}
        <div>
          <h3><span class="amount-tag">$${Number(d.amount_usd).toFixed(2)}</span><span class="method-tag">${escapeHtml(d.method)}</span></h3>
          <p>Foydalanuvchi: ${escapeHtml(d.user_id.slice(0, 8))}...</p>
          <p>${new Date(d.created_at).toLocaleString('uz-UZ')}</p>
        </div>
      </div>
      <div class="pending-actions">
        <button class="btn-approve" data-id="${d.id}">✓ Tasdiqlash</button>
        <button class="btn-reject" data-id="${d.id}">✕ Rad etish</button>
      </div>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('img.receipt-thumb').forEach((img) => {
    img.addEventListener('click', () => {
      document.getElementById('lightboxImg').src = img.dataset.full;
      document.getElementById('lightbox').classList.add('open');
    });
  });
  document.querySelectorAll('.btn-approve').forEach((btn) => {
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      const res = await fetch(`/api/admin/deposits/${btn.dataset.id}/approve`, { method: 'POST', headers: { 'x-admin-password': password } });
      if (!res.ok) { const d = await res.json(); alert(d.error || 'Xatolik'); btn.disabled = false; return; }
      loadPending();
    });
  });
  document.querySelectorAll('.btn-reject').forEach((btn) => {
    btn.addEventListener('click', async () => {
      if (!confirm('Rostdan ham rad etasizmi?')) return;
      btn.disabled = true;
      const res = await fetch(`/api/admin/deposits/${btn.dataset.id}/reject`, { method: 'POST', headers: { 'x-admin-password': password } });
      if (!res.ok) { const d = await res.json(); alert(d.error || 'Xatolik'); btn.disabled = false; return; }
      loadPending();
    });
  });
}

document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
</body>
</html>
