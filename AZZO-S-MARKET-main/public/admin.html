<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin panel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .admin-wrap{ max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .admin-wrap h1{ font-family: var(--display); font-size: 26px; margin-bottom: 20px; }
  .login-box{ max-width: 320px; margin: 80px auto; text-align:center; }
  .login-box input{ width:100%; padding: 12px; border:1px solid var(--line); border-radius: var(--radius); margin: 12px 0; }
  .admin-tabs{ display:flex; gap:8px; margin-bottom: 22px; border-bottom: 1px solid var(--line); }
  .admin-tab-btn{
    background:none; border:none; padding: 10px 16px; font-size: 14px; font-weight:600;
    color: var(--ink-soft); cursor:pointer; border-bottom: 2px solid transparent; margin-bottom:-1px;
  }
  .admin-tab-btn.active{ color: var(--primary); border-bottom-color: var(--primary); }
  .admin-panel{ display:none; }
  .admin-panel.active{ display:block; }

  .pending-item{
    border: 1px solid var(--line); border-radius: var(--radius); padding: 16px;
    margin-bottom: 14px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px;
  }
  .pending-item h3{ font-size: 16px; margin-bottom: 4px; }
  .pending-item p{ font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; }
  .pending-left{ display:flex; gap:14px; align-items:flex-start; }
  .receipt-thumb{
    width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius);
    border: 1px solid var(--line); cursor: pointer; flex-shrink: 0;
  }
  .receipt-thumb-pdf{
    display:flex; align-items:center; justify-content:center;
    background:#F4FAF8; color: var(--primary); font-weight:700; font-size:13px;
    text-decoration:none;
  }
  .pending-actions{ display:flex; gap:8px; flex-shrink:0; flex-direction:column; }
  .btn-approve{ background: var(--primary); color:#fff; border:none; padding:8px 14px; border-radius: var(--radius); cursor:pointer; font-weight:600; font-size:13px; }
  .btn-reject{ background:#fff; color:#C0392B; border:1px solid #C0392B; padding:8px 14px; border-radius: var(--radius); cursor:pointer; font-weight:600; font-size:13px; }
  .no-pending{ text-align:center; color: var(--ink-soft); padding: 40px 0; }
  .amount-tag{ font-family: var(--mono); font-weight:700; color: var(--primary); font-size: 15px; }
  .method-tag{
    display:inline-block; font-size: 11px; text-transform: uppercase; letter-spacing:.04em;
    background:#F4FAF8; color: var(--primary); padding: 2px 8px; border-radius: 999px; margin-left: 8px;
  }
  .lightbox{
    position:fixed; inset:0; background: rgba(0,0,0,.8); display:none;
    align-items:center; justify-content:center; z-index: 200; padding: 24px;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{ max-width: 90vw; max-height: 90vh; border-radius: 6px; }

  /* Ads / comments moderation */
  .mod-item{
    border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 12px; display:flex; justify-content:space-between; align-items:flex-start; gap: 14px;
  }
  .mod-item-thumb{ width: 64px; height: 64px; object-fit:cover; border-radius: var(--radius); border:1px solid var(--line); flex-shrink:0; }
  .mod-item-body{ flex:1; min-width:0; }
  .mod-item-body h3{ font-size: 15px; margin-bottom: 4px; }
  .mod-item-body p{ font-size: 13px; color: var(--ink-soft); margin-bottom: 3px; word-break: break-word; }
  .mod-tag{ display:inline-block; font-size:11px; background:#F4FAF8; color:var(--primary); padding:2px 8px; border-radius:999px; }
  .btn-delete{ background:#fff; color:#C0392B; border:1px solid #C0392B; padding:8px 14px; border-radius: var(--radius); cursor:pointer; font-weight:600; font-size:13px; flex-shrink:0; }
  .mod-search{ width:100%; padding: 10px 12px; border:1px solid var(--line); border-radius: var(--radius); margin-bottom: 16px; }

  /* ============ CUSTOM DIALOG (confirm o'rniga) ============ */
  .dialog-overlay{
    position:fixed; inset:0; background: rgba(10,12,16,0.72);
    align-items:center; justify-content:center; z-index: 300; padding: 20px;
    display:none;
  }
  .dialog-overlay:not([hidden]){ display:flex; }
  .dialog-overlay[hidden]{ display:none; }
  .dialog-box{
    background:#fff; border-radius: 14px; max-width: 340px; width:100%;
    padding: 30px 26px 24px; text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: dialogPop .22s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes dialogPop{ from{ transform: scale(.88); opacity:0; } to{ transform: scale(1); opacity:1; } }
  .dialog-sticker{ font-size: 44px; line-height:1; margin-bottom: 10px; }
  .dialog-message{ font-size: 15px; color: var(--ink); margin-bottom: 22px; line-height:1.4; }
  .dialog-actions{ display:flex; gap: 10px; }
  .dialog-btn{
    flex:1; padding: 11px 0; border-radius: 999px; font-weight:700; font-size: 14px;
    cursor:pointer; border: none; display:flex; align-items:center; justify-content:center; gap:6px;
    transition: filter .12s ease;
  }
  .dialog-btn:hover{ filter: brightness(0.94); }
  .dialog-btn-yes{ background:#2E9E5B; color:#fff; }
  .dialog-btn-no{ background:#D64545; color:#fff; }

  /* ============ TOAST (alert o'rniga) ============ */
  .toast-overlay{
    position:fixed; inset:0; background: rgba(10,12,16,0.55);
    align-items:center; justify-content:center; z-index: 310; padding: 20px;
    display:none;
  }
  .toast-overlay:not([hidden]){ display:flex; }
  .toast-overlay[hidden]{ display:none; }
  .toast-box{
    background:#fff; border-radius: 14px; max-width: 320px; width:100%;
    padding: 28px 24px 22px; text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: dialogPop .22s cubic-bezier(.34,1.56,.64,1);
  }
  .toast-sticker{ font-size: 44px; line-height:1; margin-bottom: 8px; }
  .toast-message{ font-size: 15px; color: var(--ink); margin-bottom: 18px; }
  .toast-box.is-error .toast-message{ color:#C0392B; }
  .toast-ok-btn{
    background: var(--ink); color:#fff; border:none; padding: 10px 26px;
    border-radius: 999px; font-weight:700; font-size: 14px; cursor:pointer;
  }
</style>
</head>
<body>

<div id="loginBox" class="login-box">
  <h2 style="font-family:var(--display); font-size:22px; margin-bottom:8px;">Admin kirish</h2>
  <p style="color:var(--ink-soft); font-size:13px; margin-bottom:16px;">To'ldirishlar, e'lonlar va izohlarni boshqarish</p>
  <div style="position:relative;">
    <input type="password" id="passwordInput" placeholder="Admin parol" style="padding-right:44px;" />
    <button type="button" id="togglePasswordBtn" aria-label="Parolni ko'rsatish" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; line-height:1; padding:4px;">👁️</button>
  </div>
  <button class="btn-primary btn-block" id="loginBtn">Kirish</button>
</div>

<div id="adminWrap" class="admin-wrap" hidden>
  <h1>Admin panel</h1>

  <div class="admin-tabs">
    <button class="admin-tab-btn active" data-tab="deposits">To'ldirishlar</button>
    <button class="admin-tab-btn" data-tab="ads">E'lonlar</button>
    <button class="admin-tab-btn" data-tab="comments">Izohlar</button>
  </div>

  <div class="admin-panel active" id="panel-deposits">
    <div id="pendingList"></div>
    <p id="noPending" class="no-pending" hidden>Hozircha tasdiq kutayotgan so'rov yo'q</p>
  </div>

  <div class="admin-panel" id="panel-ads">
    <input type="text" id="adsSearch" class="mod-search" placeholder="Sarlavha bo'yicha qidirish..." />
    <div id="adsList"></div>
    <p id="noAds" class="no-pending" hidden>E'lonlar topilmadi</p>
  </div>

  <div class="admin-panel" id="panel-comments">
    <input type="text" id="commentsSearch" class="mod-search" placeholder="Izoh matni bo'yicha qidirish..." />
    <div id="commentsList"></div>
    <p id="noComments" class="no-pending" hidden>Izohlar topilmadi</p>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="chek" />
</div>

<!-- CUSTOM CONFIRM DIALOG -->
<div class="dialog-overlay" id="confirmOverlay" hidden>
  <div class="dialog-box">
    <div class="dialog-sticker" id="confirmSticker">&#129300;</div>
    <p class="dialog-message" id="confirmMessage"></p>
    <div class="dialog-actions">
      <button type="button" class="dialog-btn dialog-btn-yes" id="confirmYesBtn">&#10003; Ha</button>
      <button type="button" class="dialog-btn dialog-btn-no" id="confirmNoBtn">&#10007; Yo'q</button>
    </div>
  </div>
</div>

<!-- CUSTOM TOAST (natija xabari) -->
<div class="toast-overlay" id="toastOverlay" hidden>
  <div class="toast-box" id="toastBox">
    <div class="toast-sticker" id="toastSticker">&#9989;</div>
    <p class="toast-message" id="toastMessage"></p>
    <button type="button" class="toast-ok-btn" id="toastOkBtn">OK</button>
  </div>
</div>

<script>
let password = '';

// ---------- Umumiy: custom confirm (Ha/Yo'q) ----------
function showConfirm(message, sticker) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmMessage').textContent = message;
    document.getElementById('confirmSticker').innerHTML = sticker || '&#129300;';
    overlay.hidden = false;
    const yesBtn = document.getElementById('confirmYesBtn');
    const noBtn = document.getElementById('confirmNoBtn');
    function cleanup(result) {
      overlay.hidden = true;
      yesBtn.removeEventListener('click', onYes);
      noBtn.removeEventListener('click', onNo);
      overlay.removeEventListener('click', onBackdrop);
      resolve(result);
    }
    function onYes() { cleanup(true); }
    function onNo() { cleanup(false); }
    function onBackdrop(e) { if (e.target === overlay) cleanup(false); }
    yesBtn.addEventListener('click', onYes);
    noBtn.addEventListener('click', onNo);
    overlay.addEventListener('click', onBackdrop);
  });
}

// ---------- Umumiy: custom toast (alert o'rniga) ----------
function showToast(message, isError) {
  const overlay = document.getElementById('toastOverlay');
  const box = document.getElementById('toastBox');
  box.classList.toggle('is-error', !!isError);
  document.getElementById('toastSticker').innerHTML = isError ? '&#9888;&#65039;' : '&#9989;';
  document.getElementById('toastMessage').textContent = message;
  overlay.hidden = false;
  return new Promise((resolve) => {
    function onOk() {
      overlay.hidden = true;
      document.getElementById('toastOkBtn').removeEventListener('click', onOk);
      overlay.removeEventListener('click', onBackdrop);
      resolve();
    }
    function onBackdrop(e) { if (e.target === overlay) onOk(); }
    document.getElementById('toastOkBtn').addEventListener('click', onOk);
    overlay.addEventListener('click', onBackdrop);
  });
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  password = document.getElementById('passwordInput').value;
  const ok = await loadPending();
  if (ok) {
    document.getElementById('loginBox').hidden = true;
    document.getElementById('adminWrap').hidden = false;
    loadAds();
    loadComments();
  } else {
    showToast("Parol noto'g'ri", true);
  }
});
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ---------- Parolni ko'rsatish/yashirish ----------
document.getElementById('togglePasswordBtn').addEventListener('click', () => {
  const input = document.getElementById('passwordInput');
  const btn = document.getElementById('togglePasswordBtn');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁️';
  btn.setAttribute('aria-label', isHidden ? "Parolni yashirish" : "Parolni ko'rsatish");
});

// ---------- Tabs ----------
document.querySelectorAll('.admin-tab-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab-btn').forEach((b) => b.classList.remove('active'));
    document.querySelectorAll('.admin-panel').forEach((p) => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

function adminHeaders() {
  return { 'x-admin-password': password };
}

// ---------- DEPOSITS ----------
async function loadPending() {
  const res = await fetch('/api/admin/deposits/pending', { headers: adminHeaders() });
  if (!res.ok) return false;
  const deposits = await res.json();
  renderPending(deposits);
  return true;
}

function renderPending(deposits) {
  const list = document.getElementById('pendingList');
  const empty = document.getElementById('noPending');
  list.innerHTML = '';
  empty.hidden = deposits.length > 0;

  deposits.forEach((d) => {
    const div = document.createElement('div');
    div.className = 'pending-item';
    const isPdf = /\.pdf$/i.test(d.receipt_url);
    const thumbHtml = isPdf
      ? `<a class="receipt-thumb receipt-thumb-pdf" href="${d.receipt_url}" target="_blank" rel="noopener">PDF</a>`
      : `<img class="receipt-thumb" src="${d.receipt_url}" data-full="${d.receipt_url}" alt="chek" />`;
    div.innerHTML = `
      <div class="pending-left">
        ${thumbHtml}
        <div>
          <h3><span class="amount-tag">$${Number(d.amount_usd).toFixed(2)}</span><span class="method-tag">${escapeHtml(d.method)}</span></h3>
          <p>Foydalanuvchi: ${escapeHtml(d.user_id.slice(0, 8))}...</p>
          <p>${new Date(d.created_at).toLocaleString('uz-UZ')}</p>
        </div>
      </div>
      <div class="pending-actions">
        <button class="btn-approve" data-id="${d.id}">Tasdiqlash</button>
        <button class="btn-reject" data-id="${d.id}">Rad etish</button>
      </div>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('img.receipt-thumb').forEach((img) => {
    img.addEventListener('click', () => {
      document.getElementById('lightboxImg').src = img.dataset.full;
      document.getElementById('lightbox').classList.add('open');
    });
  });
  document.querySelectorAll('.btn-approve').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const yes = await showConfirm("Bu to'lovni tasdiqlaysizmi?", '&#128176;');
      if (!yes) return;
      btn.disabled = true;
      const res = await fetch(`/api/admin/deposits/${btn.dataset.id}/approve`, { method: 'POST', headers: adminHeaders() });
      if (!res.ok) { const d = await res.json(); await showToast(d.error || 'Xatolik', true); btn.disabled = false; return; }
      await showToast('Tasdiqlandi!');
      loadPending();
    });
  });
  document.querySelectorAll('.btn-reject').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const yes = await showConfirm('Rostdan ham rad etasizmi?', '&#10060;');
      if (!yes) return;
      btn.disabled = true;
      const res = await fetch(`/api/admin/deposits/${btn.dataset.id}/reject`, { method: 'POST', headers: adminHeaders() });
      if (!res.ok) { const d = await res.json(); await showToast(d.error || 'Xatolik', true); btn.disabled = false; return; }
      await showToast('Rad etildi');
      loadPending();
    });
  });
}

// ---------- ADS MODERATION ----------
let allAds = [];
async function loadAds() {
  const res = await fetch('/api/admin/ads', { headers: adminHeaders() });
  if (!res.ok) return;
  allAds = await res.json();
  renderAds(allAds);
}
function renderAds(ads) {
  const list = document.getElementById('adsList');
  const empty = document.getElementById('noAds');
  list.innerHTML = '';
  empty.hidden = ads.length > 0;

  ads.forEach((ad) => {
    const cover = (ad.media && ad.media[0]) ? ad.media[0].url : ad.media_url;
    const div = document.createElement('div');
    div.className = 'mod-item';
    div.innerHTML = `
      ${cover ? `<img class="mod-item-thumb" src="${cover}" alt="" />` : ''}
      <div class="mod-item-body">
        <h3>${escapeHtml(ad.title)} <span class="mod-tag">${escapeHtml(ad.category || '')}</span></h3>
        <p>${escapeHtml((ad.description || '').slice(0, 140))}</p>
        <p>Tel: ${escapeHtml(ad.phone || '')} ${ad.city ? '\u00b7 ' + escapeHtml(ad.city) : ''}</p>
        <p>#${ad.id.slice(0, 8).toUpperCase()} \u00b7 ${new Date(ad.created_at).toLocaleString('uz-UZ')} \u00b7 \u{1F441}\uFE0F ${ad.views || 0} ko'rishlar</p>
      </div>
      <button class="btn-delete" data-id="${ad.id}">O'chirish</button>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('#adsList .btn-delete').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const yes = await showConfirm("Bu e'lonni butunlay o'chirasizmi? (firibgarlik/nomaqbul kontent uchun)", '&#128465;&#65039;');
      if (!yes) return;
      btn.disabled = true;
      const res = await fetch(`/api/admin/ads/${btn.dataset.id}`, { method: 'DELETE', headers: adminHeaders() });
      if (!res.ok) { const d = await res.json(); await showToast(d.error || 'Xatolik', true); btn.disabled = false; return; }
      await showToast("E'lon o'chirildi!");
      loadAds();
    });
  });
}
document.getElementById('adsSearch').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderAds(allAds.filter((a) => a.title.toLowerCase().includes(q)));
});

// ---------- COMMENTS MODERATION ----------
let allComments = [];
async function loadComments() {
  const res = await fetch('/api/admin/comments', { headers: adminHeaders() });
  if (!res.ok) return;
  allComments = await res.json();
  renderComments(allComments);
}
function renderComments(comments) {
  const list = document.getElementById('commentsList');
  const empty = document.getElementById('noComments');
  list.innerHTML = '';
  empty.hidden = comments.length > 0;

  comments.forEach((c) => {
    const div = document.createElement('div');
    div.className = 'mod-item';
    div.innerHTML = `
      <div class="mod-item-body">
        <h3>${escapeHtml(c.ad_title)} <span class="mod-tag">${'\u2605'.repeat(c.stars || 0)}</span></h3>
        <p>${escapeHtml(c.text)}</p>
        <p>Layk: ${c.likes} \u00b7 Dizlayk: ${c.dislikes} \u00b7 ${new Date(c.created_at).toLocaleString('uz-UZ')}</p>
      </div>
      <button class="btn-delete" data-id="${c.id}">O'chirish</button>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll('#commentsList .btn-delete').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const yes = await showConfirm("Bu izohni o'chirasizmi? (so'kinish/nomaqbul yozuv uchun)", '&#128465;&#65039;');
      if (!yes) return;
      btn.disabled = true;
      const res = await fetch(`/api/admin/comments/${btn.dataset.id}`, { method: 'DELETE', headers: adminHeaders() });
      if (!res.ok) { const d = await res.json(); await showToast(d.error || 'Xatolik', true); btn.disabled = false; return; }
      await showToast('Izoh ochirildi!');
      loadComments();
    });
  });
}
document.getElementById('commentsSearch').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderComments(allComments.filter((c) => c.text.toLowerCase().includes(q) || c.ad_title.toLowerCase().includes(q)));
});

document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
</body>
</html>
